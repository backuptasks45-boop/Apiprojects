    // Log a message

      const account = accountId > 0 ? accounts[accountId - 1] : null;
      const timestamp = new Date().toLocaleTimeString();
      
      // Add to account's trades if it's a trade result
      if (message.includes('Trade Result:')) {
        const plMatch = message.match(/\$([-\d.]+)/);

          account.trades.push({

            reference: `TR${account.trades.length + 1}`,
            stake: fixedStake,
            profitLoss: pl
          });

          updateAccountStatus(accountId);
          updateLogTable(accountId);

      }

        }

        return true;
      } catch (error) {
        logMessage(accountId, `❌ Failed to connect: ${error.message}`);
        return false;
      }
    }
    
    // Send message via WebSocket
    function sendMessage(accountId, message) {
      const account = accounts[accountId - 1];
      if (account.ws && account.ws.readyState === WebSocket.OPEN) {
        account.ws.send(JSON.stringify(message));
      }
    }
    
    // Start trading for an account
    function startAccountTrading(accountId) {
      const account = accounts[accountId - 1];
      
      if (!account.isConnected) {
        logMessage(accountId, "⚠️ Cannot start trading: Not connected");
        return;
      }
      
      if (account.isRunning) {
        logMessage(accountId, "⚠️ Trading already active");
        return;
      }
      
      account.isRunning = true;
      logMessage(accountId, `✅ Trading started on ${globalMarket} with stake $${fixedStake}`);
      
      // Place initial trade immediately
      placeTrade(accountId);
      
      // Set up recurring trades
      account.tradeLoop = setInterval(() => {
        if (account.isRunning && account.isConnected) {
          placeTrade(accountId);
        }
      }, tradingInterval);
      
      updateAccountStatus(accountId);
    }
    
    // Place a trade
    function placeTrade(accountId) {
      const account = accounts[accountId - 1];
      const email = document.getElementById('email').value;
      
      const tradeParams = {
        buy: 1,
        price: fixedStake,
        parameters: {
          amount: fixedStake,
          basis: 'stake',
          contract_type: 'DIGITUNDER',
          currency: 'USD',
          duration: 1,
          duration_unit: 't',
          symbol: globalMarket,
          barrier: 5
        }
      };
      
      sendMessage(accountId, tradeParams);
    }
    
    // Stop trading for an account
    function stopAccountTrading(accountId) {
      const account = accounts[accountId - 1];
      
      account.isRunning = false;
      account.isConnected = false;
      
      // Clear intervals
      if (account.tradeLoop) {
        clearInterval(account.tradeLoop);
        account.tradeLoop = null;
      }
      
      if (account.heartbeat) {
        clearInterval(account.heartbeat);
        account.heartbeat = null;
      }
      
      // Close WebSocket
      if (account.ws) {
        sendMessage(accountId, { forget_all: ['ticks', 'balance'] });
        account.ws.close();
        account.ws = null;
      }
      
      logMessage(accountId, "🛑 Trading stopped");
      updateAccountStatus(accountId);
    }
    
    // Start all configured accounts
    function startAllAccounts() {
      const email = document.getElementById('email').value;
      globalMarket = document.getElementById('market').value;
      
      // Update market display
      const marketSelect = document.getElementById('market');
      const selectedOption = marketSelect.options[marketSelect.selectedIndex].text;
      document.getElementById('marketDisplay').textContent = selectedOption;
      document.getElementById('selectedMarketText').textContent = globalMarket;
      
      logMessage(0, `🚀 Starting all configured accounts on ${selectedOption}...`);
      
      let startedCount = 0;
      
      accounts.forEach((account, index) => {
        const accountId = index + 1;
        
        if (account.apiToken && account.appId) {
          const connected = connectAccount(accountId);
          if (connected) {
            startedCount++;
          }
        } else {
          logMessage(accountId, "❌ Skipped: API Token or App ID not configured");
        }
      });
      
      logMessage(0, `✅ Started ${startedCount} of ${accounts.length} accounts`);
    }
    
    // Stop all accounts
    function stopAllAccounts() {
      logMessage(0, "🛑 Stopping all accounts...");
      
      accounts.forEach((account, index) => {
        const accountId = index + 1;
        stopAccountTrading(accountId);
      });
      
      logMessage(0, "✅ All accounts stopped");
    }
    
    // Initialize on page load
    document.addEventListener('DOMContentLoaded', () => {
      initializeAccountBoxes();
      
      // Set up event listeners
      document.getElementById('startAll').addEventListener('click', startAllAccounts);
      document.getElementById('stopAll').addEventListener('click', stopAllAccounts);
      
      // Update market display when market changes
      document.getElementById('market').addEventListener('change', function() {
        const selectedOption = this.options[this.selectedIndex].text;
        document.getElementById('marketDisplay').textContent = selectedOption;
        document.getElementById('selectedMarketText').textContent = this.value;
        globalMarket = this.value;
      });
      
      // Pre-fill some example API tokens and App IDs (for demo purposes only)
      // In a real application, these should be entered by the user
      setTimeout(() => {
        // Example data - REMOVE IN PRODUCTION
        if (!accounts[0].apiToken) {
          accounts[0].apiToken = "GjLkNmRv5uXnl5p";
          accounts[0].appId = "68801";
          document.getElementById('apiToken1').value = accounts[0].apiToken;
          document.getElementById('appId1').value = accounts[0].appId;
          
          accounts[1].apiToken = "GjLkNmRv5uXnl5p";
          accounts[1].appId = "68801";
          document.getElementById('apiToken2').value = accounts[1].apiToken;
          document.getElementById('appId2').value = accounts[1].appId;
          
          updateAccountStatus(1);
          updateAccountStatus(2);
        }
      }, 1000);
    });
  </script>
